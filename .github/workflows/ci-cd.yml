name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build_docker_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # ← This is the fix
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/git-ci-cd-test-project:${{ github.ref_name }}

  run_docker_image:
    needs: build_docker_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # ← This is the fix

    steps:
      - name: Run the container
        run: |
          echo "Pulling and starting container..."
          docker run -dt -p 8080:80 --name mycicdcontainer \
            ghcr.io/${{ github.repository_owner }}/git-ci-cd-test-project:${{ github.ref_name }}
          echo "Container started successfully!"
